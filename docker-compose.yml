# SwarmRoute MAPF — local infrastructure + host + observability (DoD §7/§8).
#   docker compose up   → PostgreSQL + RabbitMQ + the SwarmRoute host + Prometheus + Grafana
#   then: POST http://localhost:8080/api/orders {"destination":"r5c5"}  (autonomous dispatcher demo)
#         http://localhost:8080/status        — live fleet/loop snapshot
#         http://localhost:8080/metrics       — Prometheus exposition
#         http://localhost:3000               — Grafana (anonymous, the SwarmRoute Fleet dashboard)
#
# Map + TrafficControl persist (reservation snapshots) to PostgreSQL; RabbitMQ is the broker the CAP
# integration-event transport binds to when EventBus:UseInMemory=false. The host runs the autonomous dispatcher
# fleet (Dispatcher:Enabled) over an in-memory demo roadmap so the loop + metrics have data out of the box.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: swarmroute
      POSTGRES_PASSWORD: swarmroute
      POSTGRES_DB: swarmroute
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarmroute"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  host:
    build:
      context: .
      dockerfile: host/SwarmRoute.Host/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MapDatabase: "Host=postgres;Port=5432;Database=swarmroute_map;Username=swarmroute;Password=swarmroute"
      ConnectionStrings__TrafficControlDatabase: "Host=postgres;Port=5432;Database=swarmroute_traffic;Username=swarmroute;Password=swarmroute"
      EventBus__UseInMemory: "false"
      EventBus__RabbitMq__Host: "rabbitmq"
      EventBus__RabbitMq__Username: "guest"
      EventBus__RabbitMq__Password: "guest"
      RunMigrationsOnStartup: "true"
      # Autonomous dispatcher demo fleet (Track B) so the lifelong loop + metrics have live data.
      Dispatcher__Enabled: "true"
      Dispatcher__GridWidth: "8"
      Dispatcher__GridHeight: "8"
      Dispatcher__VehicleCount: "6"
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - host
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  pgdata:
